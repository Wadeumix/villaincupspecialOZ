<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VILLAIN CUP SPECIAL</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: linear-gradient(160deg, #010d25 0%, #021428 60%, #001e30 100%);
    font-family: 'Noto Sans JP', sans-serif;
    color: #fff;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  .container {
    max-width: 560px;
    width: 100%;
  }

  .panel {
    background: linear-gradient(160deg, rgba(2,20,50,0.95) 0%, rgba(4,40,80,0.92) 60%, rgba(0,60,100,0.88) 100%);
    border: 2px solid rgba(0,180,255,0.3);
    border-radius: 14px;
    overflow: hidden;
    box-shadow: 0 0 60px rgba(0,140,255,0.15), inset 0 1px 0 rgba(255,255,255,0.07);
  }

  .wave-bar {
    height: 5px;
    background: linear-gradient(90deg,
      transparent 0%,
      rgba(0,200,255,0.6) 20%,
      rgba(0,255,220,0.9) 50%,
      rgba(0,200,255,0.6) 80%,
      transparent 100%
    );
    background-size: 200% 100%;
    animation: wave 2.5s linear infinite;
  }
  @keyframes wave {
    0%   { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }

  .header {
    padding: 28px 32px 22px;
    background: rgba(0,100,180,0.25);
    border-bottom: 1px solid rgba(0,180,255,0.15);
    text-align: center;
  }

  .event-label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.2em;
    color: rgba(0,220,255,0.6);
    margin-bottom: 10px;
  }

  .event-title {
    font-size: 32px;
    font-weight: 900;
    letter-spacing: 0.1em;
    color: #e0f8ff;
    text-shadow: 0 0 24px rgba(0,200,255,0.5);
    line-height: 1.2;
  }

  .event-title span {
    color: #35c26a;
    text-shadow: 0 0 20px rgba(53,194,106,0.5);
  }

  .ended-badge {
    display: inline-block;
    margin-top: 14px;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.12em;
    color: rgba(200,230,255,0.5);
    border: 1px solid rgba(0,180,255,0.2);
    border-radius: 20px;
    padding: 4px 16px;
  }

  .body {
    padding: 28px 32px;
  }

  .thanks-text {
    font-size: 15px;
    line-height: 1.9;
    color: rgba(200,230,255,0.75);
    text-align: center;
    margin-bottom: 28px;
  }

  .divider {
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(0,180,255,0.25), transparent);
    margin-bottom: 28px;
  }

  .survey-label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.18em;
    color: rgba(0,220,255,0.5);
    text-align: center;
    margin-bottom: 14px;
  }

  .survey-desc {
    font-size: 13px;
    color: rgba(180,215,255,0.65);
    text-align: center;
    line-height: 1.7;
    margin-bottom: 22px;
  }

  .survey-btn {
    display: block;
    width: 100%;
    padding: 16px;
    background: linear-gradient(135deg, rgba(53,194,106,0.18) 0%, rgba(0,180,255,0.15) 100%);
    border: 1.5px solid rgba(53,194,106,0.5);
    border-radius: 8px;
    color: #5de88a;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-align: center;
    text-decoration: none;
    cursor: pointer;
    transition: background 0.25s, box-shadow 0.25s, transform 0.15s;
    box-shadow: 0 0 20px rgba(53,194,106,0.1);
  }

  .survey-btn:hover {
    background: linear-gradient(135deg, rgba(53,194,106,0.32) 0%, rgba(0,180,255,0.25) 100%);
    box-shadow: 0 0 30px rgba(53,194,106,0.25);
    transform: translateY(-1px);
  }

  .survey-btn:active {
    transform: translateY(0);
  }

  .footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 20px;
    border-top: 1px solid rgba(0,180,255,0.08);
  }

  .credit { display: flex; align-items: center; gap: 2px; opacity: 0.4; }
  .credit-pre { font-size: 7px; color: rgba(210,230,245,0.9); letter-spacing: 0.04em; margin-right: 2px; }
  .credit-3   { font-size: 13px; font-weight: 900; color: #d8eaf8; line-height: 1; letter-spacing: 0; }
  .credit-no1 { font-size: 13px; font-weight: 900; color: #35c26a; line-height: 1; letter-spacing: 0; }
  .credit-sep { color: rgba(150,200,230,0.3); font-size: 9px; margin: 0 3px; }
  .credit-tone { font-size: 8px; font-weight: 700; color: rgba(210,230,245,0.85); letter-spacing: 0.07em; }

  .dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: rgba(100,180,255,0.3);
  }
</style>
</head>
<body>
<div class="container">
  <div class="panel">
    <div class="wave-bar"></div>
    <div class="header">
      <div class="event-label">EVENT FINISHED</div>
      <div class="event-title">VILLAIN CUP<br><span>SPECIAL</span></div>
      <div class="ended-badge">放送終了</div>
    </div>
    <div class="body">
      <p class="thanks-text">
        ご視聴いただきありがとうございました。<br>
        今後の放送をより良くするため、<br>ぜひアンケートへのご協力をお願いします。
      </p>
      <div class="divider"></div>
      <div class="survey-label">VIEWER SURVEY</div>
      <p class="survey-desc">
        回答は数分で完了します。<br>
        皆さまのご意見をお聞かせください。
      </p>
      <a class="survey-btn" href="https://forms.gle/kgACkcgQ4Su7qRCi9" target="_blank" rel="noopener">
        アンケートに答える →
      </a>
    </div>
    <div class="footer">
      <div class="credit">
        <span class="credit-pre">powered by</span>
        <span class="credit-3">3</span><span class="credit-no1">NO1</span>
        <span class="credit-sep">·</span>
        <span class="credit-tone">TONE GROUP</span>
      </div>
      <div class="dot"></div>
    </div>
  </div>
</div>
</body>
</html>
