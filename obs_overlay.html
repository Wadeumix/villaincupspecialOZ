<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<style>
  /* =============================================
     競艇中継システム - OBSブラウザソース用 HTML
     ★ API_URL を自分のGASデプロイURLに書き換えてください
     ============================================= */

  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: transparent;
    font-family: 'Noto Sans JP', sans-serif;
    color: #fff;
    padding: 12px;
  }

  .race-title {
    font-size: 18px;
    font-weight: 900;
    letter-spacing: 0.1em;
    background: rgba(10, 30, 80, 0.85);
    border-left: 5px solid #00cfff;
    padding: 6px 12px;
    margin-bottom: 6px;
    text-transform: uppercase;
  }

  .boat-row {
    display: flex;
    align-items: center;
    background: rgba(0, 0, 0, 0.72);
    padding: 5px 10px;
    margin-bottom: 3px;
    width: 380px;
    border-radius: 2px;
    transition: opacity 0.3s;
  }

  /* 艇番カラー帯 */
  .no1 { border-left: 7px solid #ffffff; }
  .no2 { border-left: 7px solid #111111; }
  .no3 { border-left: 7px solid #e03030; }
  .no4 { border-left: 7px solid #1a5aff; }
  .no5 { border-left: 7px solid #f0d000; }
  .no6 { border-left: 7px solid #1db954; }

  .boat-no {
    width: 26px;
    text-align: center;
    font-weight: 900;
    font-size: 15px;
    margin-right: 8px;
    color: #ccc;
  }

  .boat-name {
    flex-grow: 1;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 0.05em;
  }

  .odds-label {
    font-size: 10px;
    color: #aaa;
    margin-right: 4px;
  }

  .odds {
    font-size: 16px;
    font-weight: 900;
    color: #ffeb3b;
    min-width: 48px;
    text-align: right;
  }

  .payout-label {
    font-size: 10px;
    color: #aaa;
    margin-left: 10px;
    margin-right: 4px;
  }

  .payout {
    font-size: 13px;
    font-weight: 700;
    color: #90caf9;
    min-width: 56px;
    text-align: right;
  }

  /* エラー・ロード中 */
  .status-msg {
    color: #ff8a80;
    font-size: 13px;
    padding: 8px 12px;
    background: rgba(0,0,0,0.6);
  }
</style>
</head>
<body>
<div id="display"><div class="status-msg">読み込み中...</div></div>

<script>
  // ★★★ ここを自分のGASデプロイURL（/exec で終わるURL）に書き換えてください ★★★
  const API_URL = "https://script.google.com/macros/s/xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx/exec";

  // 表示するレース番号（0〜4 で 第1〜5レース）
  // 例: 0 = 第1レース, 1 = 第2レース ...
  const TARGET_RACE_INDEX = 0;

  // 更新間隔（ミリ秒）
  const UPDATE_INTERVAL = 5000;

  async function updateDisplay() {
    try {
      const response = await fetch(API_URL, {
        method: "GET",
        redirect: "follow",
        cache: "no-store"
      });

      if (!response.ok) {
        throw new Error(`HTTPエラー: ${response.status}`);
      }

      const data = await response.json();
      const race = data[TARGET_RACE_INDEX];

      if (!race) {
        throw new Error("レースデータが見つかりません");
      }

      let html = `<div class="race-title">🚤 ${race.raceName}</div>`;

      race.boats.forEach(boat => {
        html += `
          <div class="boat-row no${boat.no}">
            <span class="boat-no">${boat.no}</span>
            <span class="boat-name">${boat.name}</span>
            <span class="odds-label">倍率</span>
            <span class="odds">${boat.odds}</span>
            <span class="payout-label">払戻</span>
            <span class="payout">¥${Number(boat.payout).toLocaleString()}</span>
          </div>`;
      });

      document.getElementById("display").innerHTML = html;

    } catch (err) {
      document.getElementById("display").innerHTML =
        `<div class="status-msg">⚠ データ取得失敗: ${err.message}</div>`;
      console.error("[競艇システム] エラー詳細:", err);
    }
  }

  // 初回即時実行 + 定期更新
  updateDisplay();
  setInterval(updateDisplay, UPDATE_INTERVAL);
</script>
</body>
</html>
